name: Generate Releases HTML
on:
  push:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: web
      
      - name: Debug releases API
        run: curl -s "https://api.github.com/repos/${{ github.repository }}/releases" | jq .
      
      - name: Get releases and generate HTML
        run: |
          echo "<!DOCTYPE html><html><head><title>Releases</title><style>body{font-family:sans-serif;max-width:800px;margin:0 auto;padding:20px;} .release{margin-bottom:30px;border-bottom:1px solid #eee;padding-bottom:20px;} .assets{margin-top:10px;}</style></head><body><h1>Releases</h1>" > releases.html
          
          curl -s "https://api.github.com/repos/${{ github.repository }}/releases" | 
          jq -r '.[] | "<div class=\"release\"><h2><a href=\"\(.html_url)\">\(.name)</a></h2><p>Tag: \(.tag_name) | Published: \(.published_at | sub("T.*Z"; "")) | Author: \(.author.login)</p><p>\(.body // "" | gsub("<";"&lt;") | gsub(">";"&gt;") | gsub("\n";"<br>") | gsub("\\*\\*(?<t>[^*]+)\\*\\*";"<strong>\(.t)</strong>") | gsub("(?<u>https?://[^\\s<]+)";"<a href=\"\(.u)\">\(.u)</a>"))</p><div class=\"assets\"><h3>Assets:</h3><ul>" + (.assets | map("<li><a href=\"\(.browser_download_url)\">\(.name)</a> (\(.size/1024/1024 | floor * 100 / 100) MB)</li>") | join("")) + "</ul></div></div>"' >> releases.html
          
          echo "</body></html>" >> releases.html
      
      - name: Debug HTML output
        run: cat releases.html
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add releases.html
          git commit -m "Update releases.html" || exit 0
          git push origin HEAD:web
